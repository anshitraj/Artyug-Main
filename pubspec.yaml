name: mobilapp_artyug
description: ArtYug - A creative platform for artists, creators, and art lovers
publish_to: 'none'
version: 1.1.0+2100

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ─── Environment Configuration ───────────────────────────────────────────
  flutter_dotenv: ^5.1.0          # .env file support

  # ─── UI & Icons ──────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0



  # ─── Navigation ──────────────────────────────────────────────────────────
  go_router: ^13.0.0
  
  # ─── State Management ────────────────────────────────────────────────────
  provider: ^6.1.1
  
  # ─── Backend ─────────────────────────────────────────────────────────────
  supabase_flutter: ^2.0.0
  gotrue: ^2.16.0 # AuthException / user-friendly auth error messages
  google_sign_in: ^6.2.1
  
  # ─── Image Handling ──────────────────────────────────────────────────────
  image_picker: ^1.0.5
  image: ^4.1.3
  
  # ─── File System ─────────────────────────────────────────────────────────
  path_provider: ^2.1.1
  file_picker: ^11.0.1
  
  # ─── HTTP & API ──────────────────────────────────────────────────────────
  http: ^1.1.0
  dio: ^5.4.0

  # ─── Crypto / Blockchain ─────────────────────────────────────────────────
  bs58: ^1.0.0                    # Base58 decode for Solana private key
  cryptography: ^2.7.0            # Ed25519 signing for Solana Memo tx (pure Dart, web-safe)
  
  # ─── AI ──────────────────────────────────────────────────────────────────
  google_generative_ai: ^0.4.0
  
  # ─── Notifications ───────────────────────────────────────────────────────
  flutter_local_notifications: ^19.5.0
  
  # ─── Utilities ───────────────────────────────────────────────────────────
  web: ^1.1.0 # window.location for reliable OAuth callback URL on Flutter web
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  add_2_calendar: ^3.0.1
  share_plus: ^12.0.2
  clipboard: ^0.1.3
  uuid: ^4.3.3                    # UUIDs for orders & certificates
  intl: ^0.19.0                   # INR currency formatting
  
  # ─── UI Components ───────────────────────────────────────────────────────
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  
  # ─── Animations ──────────────────────────────────────────────────────────
  animations: ^2.0.8

  # ─── QR Code ─────────────────────────────────────────────────────────────
  qr_flutter: ^4.1.0             # QR display on certificate
  mobile_scanner: ^3.5.7         # Camera QR scanner (Android/iOS only; web falls back to manual)

  # ─── NFC ─────────────────────────────────────────────────────────────────
  nfc_manager: ^4.2.1


  # ─── Payments ─────────────────────────────────────────────────────────────
  razorpay_flutter: ^1.3.6       # Native Razorpay checkout (Android / iOS)

  # ─── Charts (Dashboards) ─────────────────────────────────────────────────
  fl_chart: ^0.68.0              # Revenue & spend charts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env                         # Environment variables
    - assets/
    - assets/images/


