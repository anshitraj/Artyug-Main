org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Keep Kotlin incremental caches on the same drive as this project
# to avoid cross-drive cache path mismatch warnings (C: vs E:).
kotlin.project.persistent.dir=.kotlin
# Workaround for cross-drive plugin path cache issues (C:\ pub cache vs E:\ project).
kotlin.incremental=false
